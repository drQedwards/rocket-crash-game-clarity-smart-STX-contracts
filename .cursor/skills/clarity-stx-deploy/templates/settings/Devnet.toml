# Devnet settings — local Stacks node + Bitcoin regtest
# Used by: clarinet devnet start

[network]
name = "devnet"
stacks_node_rpc_address = "http://localhost:20443"
bitcoin_node_rpc_address = "http://localhost:18443"
bitcoin_node_username = "devnet"
bitcoin_node_password = "devnet"

